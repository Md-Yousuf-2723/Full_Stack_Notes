<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture 07</title>
</head>
<body>
    <h1>Learning form tag</h1>
    <h3>text type tag</h3>
    <div>
        <label for="username">Box for user name</label>
        <input type="text" name="username" id="username" placeholder="Enter username" autofocus required>
    </div>
    <h3>This is radio type tag</h3>
    <div>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female">
    </div>
    <h3>This is select type input</h3>
    <div>
        <label for="country">Select a country</label>
        <select name="country" id="country">
            <option value="Australia">Australia</option>
            <option value="Ireland">Ireland</option>
            <option value="Switcherland">Switcherland</option>
        </select>
    </div>
</body>
</html>
